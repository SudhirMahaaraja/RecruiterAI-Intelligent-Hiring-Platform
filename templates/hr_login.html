{% extends "base.html" %}
{% block title %}HR Login | RecruiterAI{% endblock %}

{% block content %}
<section class="py-4r">
    <div class="container-custom" style="max-width: 480px;">
        <div class="card-glass fade-in" style="padding: 2.5rem;">
            <div class="text-center mb-4">
                <div
                    style="width: 70px; height: 70px; border-radius: var(--radius-lg); background: linear-gradient(135deg, rgba(255, 116, 68, 0.15), rgba(255, 248, 222, 0.1)); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.8rem; color: var(--orange);">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h1 style="font-size: 1.6rem;">HR Portal</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Manage applications, assessments, and hiring
                    pipeline</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label-custom">Username</label>
                    <input type="text" name="username" class="form-control-custom" placeholder="Enter your username"
                        required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label-custom">Password</label>
                    <input type="password" name="password" class="form-control-custom" placeholder="Enter your password"
                        required>
                </div>
                <button type="submit" class="btn-primary-custom btn-lg w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <div class="text-center mt-3">
                <small style="color: var(--text-muted);">
                    Default: <code style="color: var(--accent);">admin</code> / <code
                        style="color: var(--accent);">admin123</code>
                </small>
            </div>
        </div>
    </div>
</section>
{% endblock %}
